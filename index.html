<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cancionero GdeFe</title>
  <meta name="theme-color" content="#0d0d0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cancionero">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Imágenes/cruz.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ── TOP BAR ── -->
  <header class="top-bar" id="topBar">
    <div class="tb-left">
      <button class="tb-hamburger" id="mobBtn" aria-label="Menú">☰</button>
      <div class="tb-brand">
        <img class="tb-logo" src="Imágenes/cruz.png" alt="Logo">
        <span class="tb-name">Cancionero</span>
      </div>
      <span class="tb-song-title" id="bottomSongTitle">—</span>
    </div>
    <div class="tb-right">
      <div class="transpose">
        <span class="tr-lbl">Tono</span>
        <button class="tr-btn" id="trDown">−</button>
        <span class="key-disp" id="currentKey">C</span>
        <button class="tr-btn" id="trUp">+</button>
      </div>
      <div class="tb-actions">
        <!-- Always visible -->
        <button class="tb-btn" id="btnFontDown" title="Reducir tamaño de letra">A−</button>
        <button class="tb-btn" id="btnFontUp" title="Aumentar tamaño de letra">A+</button>
        <button class="tb-btn on" id="btnChords" title="Ocultar/Mostrar acordes">🎸</button>
        <button class="tb-btn" id="btnFavoriteDetail" title="Marcar como favorita">☆</button>
        <div class="theme-toggle" id="themeToggle" data-theme-state="dark" role="button" tabindex="0" title="Cambiar tema" style="display:inline-flex">
          <span class="tt-icon tt-sun">☀</span>
          <span class="tt-icon tt-moon">☾</span>
          <div class="tt-knob"></div>
        </div>

        <!-- Overflow toggle -->
        <button class="tb-btn tb-ov-btn" id="tbOvBtn" title="Más opciones">⋯</button>

        <!-- Overflow menu -->
        <div class="tb-ov-menu" id="tbOvMenu">
          <button class="tb-ov-item" id="btnFit" title="Ajustar a la pantalla">📐 Ajustar</button>
          <div class="tb-ov-row">
            <button class="tb-ov-item on" id="btnCol1" title="Una columna">▐ 1 col</button>
            <button class="tb-ov-item" id="btnCol2" title="Dos columnas">▐ 2 cols</button>
          </div>
          <button class="tb-ov-item" id="btnLayout" title="Acordes sobre la letra">≡ Acordes arriba</button>
          <button class="tb-ov-item" id="btnNotation" title="Notación americana">🇺🇸 Notación</button>
          <div class="tb-ov-sep"></div>
          <button class="tb-ov-item" id="favoritesFilter">⭐ Filtrar fav</button>
          <button class="tb-ov-item hide-mobile" id="btnPrint" title="Imprimir">🖨️ Imprimir</button>
          <button class="tb-ov-item" id="btnEditSong" title="Editar canción">✎ Editar</button>
          <button class="tb-ov-item" id="btnPublish" title="Sincronizar canciones desde la nube" style="display:none">📋 Sincronizar</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── DRAWER OVERLAY ── -->
  <div class="drawer-overlay" id="mobOvl"></div>

  <!-- ── DRAWER (sidebar) ── -->
  <nav class="drawer sidebar" id="sidebar">
    <!-- View pills -->
    <div class="vpills">
      <button class="vp active" id="vp1">🎵 Canciones</button>
      <button class="vp" id="vp2">🎸 Afinador</button>
    </div>

    <!-- Search in drawer -->
    <div class="dr-search">
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="searchInput" type="text" placeholder="Buscar… (#G para tonalidad)">
        <button class="search-clear" id="searchClear" aria-label="Limpiar búsqueda">×</button>
      </div>
    </div>

    <!-- Body: alpha-col (A-Z + sections) + song-col -->
    <div class="sb-body">
      <div class="alpha-col" id="alphaTabs"></div>
      <div class="song-col">
        <div class="col-head">
          <span id="colHead">Todas</span>
          <span class="col-count" id="colCount">0</span>
        </div>
        <div class="song-list" id="songList"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="sb-foot">
      <button class="fb fb-add" id="btnAddSong">+ Agregar canción</button>
      <button class="fb fb-setlist" id="btnSetlist">📋 Setlists</button>
      <button class="fb fb-sec" id="btnAddSection">+ Sección</button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <div class="app">
    <div class="main">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon"><img src="Imágenes/cruz.png" alt="Logo" class="welcome-logo"></div>
        <h2>Elige una canción</h2>
        <p>Selecciona del listado o agrega una nueva</p>
      </div>
      <div id="songView">
        <div class="song-hdr">
          <div class="song-hdr-l">
            <h1 id="songTitle">—</h1>
            <div class="song-meta" id="songMeta"></div>
          </div>
        </div>
        <div class="scroll-progress" id="scrollProgress"><div class="sp-fill" id="scrollProgressFill"></div></div>
        <div class="song-body" id="songBody"></div>
        <div class="scroll-bar">
          <button class="scroll-tog scroll-tog--danger" id="btnDelete">🗑 Eliminar</button>
        </div>
      </div>
      <button class="hdr-show" id="btnShowHdr" title="Mostrar controles">▾</button>
      <div class="tuner-view" id="tunerView">
        <div class="tuner-note" id="tunerNote">—</div>
        <div class="tuner-freq" id="tunerFreq">0 Hz</div>
        <div class="tuner-gauge-wrap">
          <canvas id="tunerCanvas" width="260" height="260"></canvas>
        </div>
        <div class="tuner-meter">
          <div class="tm-line"></div>
          <div class="tm-ind" id="tmInd"></div>
        </div>
        <div class="tuner-labels">
          <span>♭</span>
          <span class="tuner-status" id="tunerStatus">—</span>
          <span>♯</span>
        </div>
        <button class="tuner-start" id="btnTuner">🎸 Iniciar Afinador</button>
        <div class="tuner-strings">
          <button class="str-btn" data-note="E4">E4</button>
          <button class="str-btn" data-note="B3">B3</button>
          <button class="str-btn" data-note="G3">G3</button>
          <button class="str-btn" data-note="D3">D3</button>
          <button class="str-btn" data-note="A2">A2</button>
          <button class="str-btn" data-note="E2">E2</button>
        </div>
        <p class="tuner-hint">Toca una nota para empezar. El medidor indica qué tan afinado estás.</p>
      </div>
    </div>
  </div>

  <!-- bottom-bar eliminada — todos los controles están en la top-bar -->

  <!-- ── Login Overlay ── -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">
        <img src="Imágenes/cruz.png" alt="GdeFe" class="login-icon">
        <h1>Cancionero GdeFe</h1>
      </div>
      <form class="login-form" id="loginForm">
        <div class="login-field">
          <label for="loginUser">Usuario</label>
          <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="loginPass">Contraseña</label>
          <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" required>
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="login-btn" id="loginBtn">Ingresar</button>
        <p class="login-switch">¿No tienes cuenta? <a href="#" id="showRegister">Registrarse</a></p>
      </form>
      <form class="login-form" id="registerForm" style="display:none">
        <div class="login-field">
          <label for="regUser">Nuevo usuario</label>
          <input type="text" id="regUser" placeholder="Elige un usuario" autocomplete="off" required>
        </div>
        <div class="login-field">
          <label for="regPass">Contraseña</label>
          <input type="password" id="regPass" placeholder="Elige una contraseña" autocomplete="off" required>
        </div>
        <div class="login-field">
          <label for="regPass2">Repetir contraseña</label>
          <input type="password" id="regPass2" placeholder="Repite la contraseña" autocomplete="off" required>
        </div>
        <p class="login-error" id="regError"></p>
        <button type="submit" class="login-btn" id="regBtn">Crear cuenta</button>
        <p class="login-switch">¿Ya tienes cuenta? <a href="#" id="showLogin">Iniciar sesión</a></p>
      </form>
    </div>
  </div>

  <div class="overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="ctx" id="ctxMenu"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
